<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NosTechnology 取引先ポータル</title>
  <style>
    :root{--ink:#172033;--muted:#637088;--line:#d9e0ea;--paper:#fff;--base:#f5f7fb;--teal:#147c72;--blue:#315f9d;--amber:#a86625}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(180deg,#eef4f6,rgba(238,244,246,0) 340px),var(--base);font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;line-height:1.7}button,input,select,textarea{font:inherit}button{min-height:44px;border:0;border-radius:8px;padding:0 18px;color:#fff;background:var(--teal);cursor:pointer}button:disabled{opacity:.62;cursor:wait}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 13px;color:var(--ink);background:#fff}textarea{resize:vertical}label{display:grid;gap:7px;color:var(--muted);font-size:.88rem;font-weight:700}a{color:var(--blue);font-weight:700;text-decoration:none}.topbar,.layout{width:min(1120px,calc(100% - 32px));margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;padding:28px 0 18px}.topbar h1{margin:2px 0 0;font-size:clamp(1.35rem,2.4vw,2.1rem);letter-spacing:0}.eyebrow{margin:0;color:var(--teal);font-size:.74rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.pill{display:inline-flex;align-items:center;min-height:34px;border:1px solid rgba(20,124,114,.18);border-radius:999px;padding:0 13px;color:var(--teal);background:#dff3ee;font-size:.86rem;font-weight:800;white-space:nowrap}.layout{padding-bottom:56px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:0 18px 44px rgba(23,32,51,.09)}.login{display:grid;grid-template-columns:minmax(220px,.8fr) minmax(280px,1.2fr);gap:28px;align-items:end;padding:30px}.login h2,.empty h2{margin:8px 0 0;font-size:clamp(1.5rem,2.5vw,2.4rem);letter-spacing:0}.login form,.message-form{display:grid;gap:12px}.input-row{display:grid;grid-template-columns:1fr auto;gap:10px}.ghost{border:1px solid var(--line);color:var(--ink);background:#fff}.dashboard{display:grid;gap:18px}.head{display:flex;justify-content:space-between;gap:18px;padding:24px}.head h2{margin:6px 0 4px;font-size:clamp(1.4rem,2.4vw,2rem);letter-spacing:0}.muted{margin:0;color:var(--muted)}.tabs{display:flex;gap:8px;overflow-x:auto}.tab{min-height:40px;border:1px solid var(--line);color:var(--muted);background:#fff;white-space:nowrap}.tab.active{border-color:rgba(20,124,114,.3);color:var(--teal);background:#dff3ee}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric{display:grid;gap:9px;min-height:112px;padding:18px;border:1px solid var(--line);border-radius:8px;background:#fff}.metric span{color:var(--muted);font-size:.82rem;font-weight:800}.metric strong{align-self:end;font-size:clamp(1.15rem,1.8vw,1.45rem);letter-spacing:0}.work{padding:20px}.title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.title h3{margin:0;font-size:1.05rem}.title span{color:var(--amber);font-size:.88rem;font-weight:800}.track{height:14px;overflow:hidden;border-radius:999px;background:#e6ebf1}.bar{width:0;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .24s ease}.details{display:grid;margin:20px 0 0;border-top:1px solid var(--line)}.details div{display:grid;grid-template-columns:minmax(110px,.22fr) 1fr;gap:18px;padding:15px 0;border-bottom:1px solid var(--line)}dt{color:var(--muted);font-size:.84rem;font-weight:800}dd{margin:0}.two{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:18px;align-items:start}.messages{display:grid;gap:10px}.message{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fbfcfe}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;color:var(--muted);font-size:.82rem;font-weight:700}.type{border-radius:999px;padding:3px 8px;color:var(--amber);background:#fff2cf}.message p{margin:0;white-space:pre-wrap}.form-status{min-height:22px;margin:0;color:var(--teal);font-size:.9rem;font-weight:700}.empty{padding:30px}.hidden{display:none!important}@media(max-width:840px){.topbar{align-items:flex-start}.login,.two,.head{grid-template-columns:1fr}.head{display:grid}.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.input-row{grid-template-columns:1fr}}@media(max-width:540px){.topbar{display:grid}.summary{grid-template-columns:1fr}.details div{grid-template-columns:1fr;gap:6px}.login,.head,.work,.empty{padding:18px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div><p class="eyebrow">Client Portal</p><h1>NosTechnology 取引先ポータル</h1></div>
    <span class="pill">共有専用</span>
  </header>
  <main class="layout">
    <section id="login" class="panel login">
      <div><p class="eyebrow">Access</p><h2>アクセスキーを入力</h2></div>
      <form id="loginForm">
        <label>アクセスキー<div class="input-row"><input id="accessKey" autocomplete="off" placeholder="例: demo-cafe-2026" /><button id="openButton">開く</button></div></label>
        <button id="demoButton" class="ghost" type="button">デモを表示</button>
      </form>
    </section>
    <section id="dashboard" class="dashboard hidden">
      <div class="panel head"><div><p class="eyebrow" id="clientLabel">Client</p><h2 id="projectTitle">プロジェクト</h2><p id="lastUpdated" class="muted"></p></div><button id="changeKey" class="ghost" type="button">キー変更</button></div>
      <div id="tabs" class="tabs"></div>
      <section class="summary">
        <article class="metric"><span>ステータス</span><strong id="status">-</strong></article>
        <article class="metric"><span>現在フェーズ</span><strong id="phase">-</strong></article>
        <article class="metric"><span>次回期限</span><strong id="due">-</strong></article>
        <article class="metric"><span>担当</span><strong id="owner">-</strong></article>
      </section>
      <section class="panel work"><div class="title"><h3>進捗</h3><span id="progressText">0%</span></div><div class="track"><div id="progressBar" class="bar"></div></div><dl class="details"><div><dt>次アクション</dt><dd id="nextAction">-</dd></div><div><dt>共有メモ</dt><dd id="sharedMemo">-</dd></div><div><dt>リンク</dt><dd id="links">-</dd></div></dl></section>
      <div class="two">
        <section class="panel work"><div class="title"><h3>やり取り</h3><span id="messageCount">0件</span></div><div id="messageList" class="messages"></div></section>
        <section class="panel work"><div class="title"><h3>連絡する</h3><span id="caseLabel">-</span></div><form id="messageForm" class="message-form"><label>お名前<input id="senderName" placeholder="会社名・お名前" /></label><label>種別<select id="messageType"><option>連絡</option><option>確認依頼</option><option>素材共有</option><option>修正依頼</option></select></label><label>内容<textarea id="messageBody" rows="6" placeholder="確認したいこと、共有したいことを入力"></textarea></label><label>添付URL<input id="attachmentUrl" type="url" placeholder="Google Driveや資料URL" /></label><button type="submit">送信</button><p id="submitStatus" class="form-status" role="status"></p></form></section>
      </div>
    </section>
    <section id="empty" class="panel empty hidden"><h2>表示できませんでした</h2><p id="emptyMessage" class="muted">アクセスキーを確認してください。</p><button id="retry" class="ghost" type="button">戻る</button></section>
  </main>
  <script>
    const CONFIG={appsScriptUrl:"https://script.google.com/macros/s/AKfycby-OzGcHJEWcxmi2dAX_-BFCOZDhDeeqmciFLEyD39oZ9r7mb3ASAYUSLW_cMGJeEL8/exec",storageKey:"nos_client_portal_access_key",demoKey:"demo-cafe-2026"};
    const state={token:"",projects:[],messages:[],selectedCaseId:""};
    const $=(id)=>document.getElementById(id);
    const els={login:$("login"),dashboard:$("dashboard"),empty:$("empty"),emptyMessage:$("emptyMessage"),loginForm:$("loginForm"),accessKey:$("accessKey"),openButton:$("openButton"),demoButton:$("demoButton"),retry:$("retry"),changeKey:$("changeKey"),clientLabel:$("clientLabel"),projectTitle:$("projectTitle"),lastUpdated:$("lastUpdated"),tabs:$("tabs"),status:$("status"),phase:$("phase"),due:$("due"),owner:$("owner"),progressText:$("progressText"),progressBar:$("progressBar"),nextAction:$("nextAction"),sharedMemo:$("sharedMemo"),links:$("links"),messageCount:$("messageCount"),messageList:$("messageList"),caseLabel:$("caseLabel"),messageForm:$("messageForm"),senderName:$("senderName"),messageType:$("messageType"),messageBody:$("messageBody"),attachmentUrl:$("attachmentUrl"),submitStatus:$("submitStatus")};
    init();
    function init(){const p=new URLSearchParams(location.search);const token=p.get("key")||p.get("token")||localStorage.getItem(CONFIG.storageKey)||"";els.accessKey.value=token;els.loginForm.addEventListener("submit",e=>{e.preventDefault();loadPortal(els.accessKey.value)});els.demoButton.addEventListener("click",()=>{els.accessKey.value=CONFIG.demoKey;loadPortal(CONFIG.demoKey)});els.retry.addEventListener("click",showLogin);els.changeKey.addEventListener("click",showLogin);els.messageForm.addEventListener("submit",submitMessage);if(token)loadPortal(token)}
    async function loadPortal(raw){const token=clean(raw);if(!token){showError("アクセスキーを入力してください。");return}state.token=token;els.openButton.disabled=true;els.openButton.textContent="読み込み中";try{const data=await jsonp({action:"clientPortal",token});if(!data||!data.ok||!Array.isArray(data.projects)||!data.projects.length)throw new Error(data&&data.error?data.error:"公開プロジェクトが見つかりません。");localStorage.setItem(CONFIG.storageKey,token);state.projects=data.projects;state.messages=Array.isArray(data.messages)?data.messages:[];state.selectedCaseId=state.projects[0].caseId;render(data.updatedAt)}catch(e){showError(e&&e.message?e.message:"読み込みに失敗しました。Apps Scriptのデプロイ状況を確認してください。")}finally{els.openButton.disabled=false;els.openButton.textContent="開く"}}
    function jsonp(params){return new Promise((resolve,reject)=>{const cb=`portalCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;const url=new URL(CONFIG.appsScriptUrl);Object.entries({...params,callback:cb}).forEach(([k,v])=>url.searchParams.set(k,v));const s=document.createElement("script");const timer=setTimeout(()=>{cleanup();reject(new Error("Apps Scriptの取引先ポータルAPIがまだ有効になっていません。"))},12000);window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{cleanup();reject(new Error("データを取得できませんでした。"))};s.src=url.toString();document.body.appendChild(s);function cleanup(){clearTimeout(timer);delete window[cb];s.remove()}})}
    function render(updatedAt){const p=project();const msgs=messages();section("dashboard");els.clientLabel.textContent=p.clientName||"Client";els.projectTitle.textContent=p.projectName||"プロジェクト";els.lastUpdated.textContent=`最終更新: ${p.lastUpdated||updatedAt||"-"}`;els.status.textContent=p.status||"-";els.phase.textContent=p.phase||"-";els.due.textContent=p.dueDate||"-";els.owner.textContent=p.owner||"-";els.nextAction.textContent=p.nextAction||"-";els.sharedMemo.textContent=p.sharedMemo||"-";els.caseLabel.textContent=p.caseId||"-";const progress=Math.min(100,Math.max(0,Math.round(Number(p.progress)||0)));els.progressText.textContent=`${progress}%`;els.progressBar.style.width=`${progress}%`;els.links.innerHTML=links(p);renderTabs();renderMessages(msgs)}
    function renderTabs(){els.tabs.innerHTML="";state.projects.forEach(p=>{const b=document.createElement("button");b.type="button";b.className=`tab${p.caseId===state.selectedCaseId?" active":""}`;b.textContent=p.projectName||p.caseId||"プロジェクト";b.onclick=()=>{state.selectedCaseId=p.caseId;render()};els.tabs.appendChild(b)})}
    function links(p){const items=[["納品物",p.deliverableUrl],["参考",p.referenceUrl]].filter(([,u])=>clean(u));return items.length?items.map(([l,u])=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(l)}</a>`).join(" / "):"-"}
    function renderMessages(msgs){els.messageCount.textContent=`${msgs.length}件`;els.messageList.innerHTML="";if(!msgs.length){els.messageList.innerHTML='<div class="message"><p>まだ共有されたやり取りはありません。</p></div>';return}msgs.slice().reverse().forEach(m=>{const div=document.createElement("article");div.className="message";div.innerHTML=`<div class="meta"><span>${esc(m.postedAt||"-")}</span><span>${esc(m.author||"取引先")}</span><span class="type">${esc(m.type||"連絡")}</span><span>${esc(m.status||"")}</span></div><p>${esc(m.body||"-")}</p>${m.attachmentUrl?`<p><a href="${esc(m.attachmentUrl)}" target="_blank" rel="noopener">添付URL</a></p>`:""}`;els.messageList.appendChild(div)})}
    async function submitMessage(e){e.preventDefault();const p=project();const body=clean(els.messageBody.value);if(!body){els.submitStatus.textContent="内容を入力してください。";return}const button=els.messageForm.querySelector('button[type="submit"]');button.disabled=true;els.submitStatus.textContent="送信中です。";const payload={source:"client-portal-message",token:state.token,caseId:p.caseId,name:clean(els.senderName.value),messageType:clean(els.messageType.value),message:body,attachmentUrl:clean(els.attachmentUrl.value)};try{await fetch(CONFIG.appsScriptUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});els.submitStatus.textContent="送信しました。スプレッドシートに反映されます。";state.messages.push({messageId:`local-${Date.now()}`,postedAt:"送信直後",caseId:p.caseId,author:payload.name||"取引先",type:payload.messageType,body:payload.message,attachmentUrl:payload.attachmentUrl,status:"送信済み"});els.messageBody.value="";els.attachmentUrl.value="";render()}catch(err){els.submitStatus.textContent="送信できませんでした。時間をおいて再度お試しください。"}finally{button.disabled=false}}
    function project(){return state.projects.find(p=>p.caseId===state.selectedCaseId)||state.projects[0]||{}}function messages(){return state.messages.filter(m=>m.caseId===state.selectedCaseId)}function showLogin(){localStorage.removeItem(CONFIG.storageKey);section("login")}function showError(message){els.emptyMessage.textContent=message;section("empty")}function section(name){els.login.classList.toggle("hidden",name!=="login");els.dashboard.classList.toggle("hidden",name!=="dashboard");els.empty.classList.toggle("hidden",name!=="empty")}function clean(v){return v==null?"":String(v).trim()}function esc(v){return clean(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
  </script>
</body>
</html>
